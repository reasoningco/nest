jira:
  # Atlassian org "reasoning" / site TRC Jira
  # (org a5229fe2-955a-45af-ab47-39728357343d, cloud 61d51752-ba4f-4b6f-8052-e56af898918d)
  base_url: https://reasoning.atlassian.net
  email_env: JIRA_EMAIL
  token_env: JIRA_API_TOKEN
  projects:
    # `name` sets the UI bubble label. `repos` lists GitHub repos whose
    # commits should bucket under the same project for clustering.
    - { key: DEV,  name: ChefOS,     repos: [ChefOS, ChefOsLP] }
    - { key: FRMS, name: Forms,      repos: [form] }
    - { key: KNYN, name: Kanyon,     repos: [kanyon-web, kanyon-ios] }
    - { key: OPS,  name: Operations }

