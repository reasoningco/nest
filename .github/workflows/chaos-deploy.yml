name: Chaos Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy when rollback_ref is empty"
        required: true
        default: "main"
      rollback_ref:
        description: "Emergency rollback ref. When set, production main is reset to this ref."
        required: false
        default: ""

jobs:
  gate:
    name: Build and test gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/chaos
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.rollback_ref != '' && inputs.rollback_ref || inputs.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/chaos/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - name: Configure SSH
        env:
          PROD_SSH_HOST: ${{ secrets.TRC3_SSH_HOST }}
          PROD_SSH_KEY: ${{ secrets.TRC3_SSH_KEY }}
          PROD_SSH_PORT: ${{ secrets.TRC3_SSH_PORT }}
          PROD_SSH_USER: ${{ secrets.TRC3_SSH_USER }}
        run: |
          test -n "$PROD_SSH_HOST"
          test -n "$PROD_SSH_KEY"
          test -n "$PROD_SSH_USER"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${PROD_SSH_PORT:-22}" "$PROD_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy checked ref
        env:
          DEPLOY_REF: ${{ inputs.ref }}
          ROLLBACK_REF: ${{ inputs.rollback_ref }}
          PROD_SSH_HOST: ${{ secrets.TRC3_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.TRC3_SSH_PORT }}
          PROD_SSH_USER: ${{ secrets.TRC3_SSH_USER }}
        run: |
          target_ref="${ROLLBACK_REF:-$DEPLOY_REF}"
          ssh -i ~/.ssh/deploy_key -p "${PROD_SSH_PORT:-22}" "$PROD_SSH_USER@$PROD_SSH_HOST" \
            bash -s -- "$target_ref" "$ROLLBACK_REF" <<'REMOTE'
          set -euo pipefail
          TARGET_REF="$1"
          ROLLBACK_REF="$2"

          cd /srv/cookbook
          git fetch origin --tags
          git checkout main
          if [ -n "${ROLLBACK_REF:-}" ]; then
            git reset --hard "$TARGET_REF"
          else
            git pull --ff-only origin "$TARGET_REF"
          fi

          sudo mkdir -p /etc/chaos/config
          if [ ! -f /etc/chaos/chaos.env ] && [ -f /opt/chaos/.env ]; then
            sudo cp /opt/chaos/.env /etc/chaos/chaos.env
            sudo chmod 600 /etc/chaos/chaos.env
          fi
          if [ ! -f /etc/chaos/config/sources.yaml ] && [ -f /opt/chaos/config/sources.yaml ]; then
            sudo cp /opt/chaos/config/sources.yaml /etc/chaos/config/sources.yaml
          fi

          cd /srv/cookbook/sdk/chaos
          sudo ln -sfn /etc/chaos/chaos.env .env
          sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build chaos

          token="$(sudo sed -n 's/^CHAOS_TELEMETRY_TOKEN=//p' /etc/chaos/chaos.env | tail -1)"
          for i in $(seq 1 30); do
            code="$(curl -fsS -o /tmp/chaos-project-stats.json -w '%{http_code}' \
              -H "Authorization: Bearer ${token}" \
              http://127.0.0.1:3078/api/project-stats 2>/tmp/chaos-curl.err || true)"
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/chaos-curl.err >&2
          exit 1
          REMOTE
