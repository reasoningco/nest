name: Chaos CI

on:
  pull_request:
    paths:
      - ".github/workflows/chaos-ci.yml"
      - "sdk/chaos/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/chaos-ci.yml"
      - "sdk/chaos/**"

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/chaos
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/chaos/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
